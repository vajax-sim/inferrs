name: Sync upstream

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Sync from ericcurtin/inferrs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync upstream main
        run: gh repo sync vajax-sim/inferrs --source ericcurtin/inferrs --branch main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
