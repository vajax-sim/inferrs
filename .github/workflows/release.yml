name: Release

on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── macOS binary (Metal, linked directly) ─────────────────────────────────
  build-macos:
    name: Build (aarch64-apple-darwin)
    runs-on: macos-26
    env:
      RUSTFLAGS: "-C target-feature=+fullfp16"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-aarch64-apple-darwin

      - name: Build main binary
        run: cargo build --release --target aarch64-apple-darwin -p inferrs

      # ── OpenVINO backend plugin (no compile-time SDK needed) ─────────────
      - name: Build OpenVINO backend plugin
        run: |
          cargo build --release --target aarch64-apple-darwin \
            -p inferrs-backend-openvino

      - name: Package
        run: |
          RELEASE_DIR="target/aarch64-apple-darwin/release"
          STAGE="inferrs-macos-aarch64"
          mkdir -p "$STAGE"
          cp "$RELEASE_DIR/inferrs" "$STAGE/"
          for lib in \
            libinferrs_backend_openvino.dylib; do
            [ -f "$RELEASE_DIR/$lib" ] && cp "$RELEASE_DIR/$lib" "$STAGE/"
          done
          tar -czf inferrs-aarch64-apple-darwin.tar.gz "$STAGE"

      - uses: actions/upload-artifact@v4
        with:
          name: inferrs-aarch64-apple-darwin
          path: inferrs-aarch64-apple-darwin.tar.gz

  # ── Linux x86_64: main binary (with CUDA support) + all backend plugins ─────
  build-linux-x86:
    name: Build (x86_64-unknown-linux-gnu)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-x86_64-linux

      # ── CUDA backend plugin + main binary ───────────────────────────────
      # Install the CUDA toolkit so nvcc can compile candle-kernels PTX.
      # The main binary and CUDA backend must be built in the same cargo
      # invocation so that Cargo's feature unification propagates the `cuda`
      # feature to candle-core inside the main binary — without it,
      # Device::new_cuda() is unavailable at runtime even when the plugin
      # probe succeeds.
      #
      # candle-core is patched (candle-core/) to use cudarc with
      # fallback-dynamic-loading instead of dynamic-linking, so the resulting
      # binary dlopen()s CUDA libs on demand and has no hard DT_NEEDED entries
      # for libcuda.so / libcurand.so / libcublas.so.
      - name: Install CUDA toolkit
        run: |
          wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cuda-toolkit-12-6
          echo "/usr/local/cuda/bin" >> "$GITHUB_PATH"
          echo "CUDA_PATH=/usr/local/cuda" >> "$GITHUB_ENV"
          # No GPU on CI runners; set a broadly-compatible compute capability
          # so bindgen_cuda skips the nvidia-smi probe and nvcc validation.
          echo "CUDA_COMPUTE_CAP=80" >> "$GITHUB_ENV"

      - name: Build main binary + CUDA backend plugin
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu \
            -p inferrs -p inferrs-backend-cuda

      # ── ROCm backend plugin ──────────────────────────────────────────────
      - name: Install ROCm toolkit
        run: |
          wget -q https://repo.radeon.com/amdgpu-install/6.3.3/ubuntu/noble/amdgpu-install_6.3.60303-1_all.deb
          sudo dpkg -i amdgpu-install_6.3.60303-1_all.deb || true
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            rocm-dev hip-dev

      - name: Build ROCm backend plugin
        env:
          ROCM_PATH: /opt/rocm
          HIP_PATH: /opt/rocm
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu \
            -p inferrs-backend-rocm

      # ── MUSA backend plugin (no GPU toolchain needed at compile time) ───
      # The MUSA plugin probes libmusart.so via dlopen at runtime; building it
      # only requires the Rust toolchain, so no MUSA SDK install is needed here.
      - name: Build MUSA backend plugin
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu \
            -p inferrs-backend-musa

      # ── Vulkan backend plugin (no GPU toolchain needed) ──────────────────
      - name: Build Vulkan backend plugin
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu \
            -p inferrs-backend-vulkan

      # ── OpenVINO backend plugin (no compile-time SDK needed) ─────────────
      - name: Build OpenVINO backend plugin
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu \
            -p inferrs-backend-openvino

      # ── CANN backend plugin (no compile-time CANN SDK needed) ────────────
      # The CANN plugin probes libascendcl.so via dlopen at runtime; only
      # the Rust toolchain is required at compile time.
      - name: Build CANN backend plugin
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu \
            -p inferrs-backend-cann

      # ── Hexagon backend plugin (fast-fails gracefully on non-Snapdragon) ─
      # No compile-time Hexagon SDK is needed; the plugin uses dlopen to
      # probe libcdsprpc.so at runtime and returns unavailable on x86_64.
      - name: Build Hexagon backend plugin
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu \
            -p inferrs-backend-hexagon

      # ── Package everything into one tarball ──────────────────────────────
      - name: Package
        run: |
          RELEASE_DIR="target/x86_64-unknown-linux-gnu/release"
          STAGE="inferrs-linux-x86_64"
          mkdir -p "$STAGE"

          # Main binary
          cp "$RELEASE_DIR/inferrs" "$STAGE/"

          # Backend plugins (ship all; the binary picks the right one at
          # runtime via dlopen — missing plugins are silently skipped)
          for lib in \
            libinferrs_backend_cann.so \
            libinferrs_backend_cuda.so \
            libinferrs_backend_hexagon.so \
            libinferrs_backend_musa.so \
            libinferrs_backend_openvino.so \
            libinferrs_backend_rocm.so \
            libinferrs_backend_vulkan.so; do
            if [ -f "$RELEASE_DIR/$lib" ]; then
              cp "$RELEASE_DIR/$lib" "$STAGE/"
            fi
          done

          tar -czf inferrs-x86_64-unknown-linux-gnu.tar.gz "$STAGE"

      - uses: actions/upload-artifact@v4
        with:
          name: inferrs-x86_64-unknown-linux-gnu
          path: inferrs-x86_64-unknown-linux-gnu.tar.gz

  # ── Linux aarch64: main binary + CUDA/ROCm/Vulkan plugins ───────────────
  build-linux-arm64:
    name: Build (aarch64-unknown-linux-gnu)
    runs-on: ubuntu-24.04-arm
    env:
      RUSTFLAGS: "-C target-feature=+fullfp16"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-aarch64-linux

      # ── CUDA toolkit (aarch64 supports CUDA on Jetson/Grace/etc.) ────────
      - name: Install CUDA toolkit
        run: |
          wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/sbsa/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cuda-toolkit-12-6
          echo "/usr/local/cuda/bin" >> "$GITHUB_PATH"
          echo "CUDA_PATH=/usr/local/cuda" >> "$GITHUB_ENV"
          echo "CUDA_COMPUTE_CAP=87" >> "$GITHUB_ENV"

      # ── Main binary + CUDA backend plugin ────────────────────────────────
      - name: Build main binary + CUDA backend plugin
        run: |
          cargo build --release --target aarch64-unknown-linux-gnu \
            -p inferrs -p inferrs-backend-cuda

      # ── ROCm backend plugin ───────────────────────────────────────────────
      # AMD's ROCm apt repository only publishes binary-amd64 packages; there
      # are no pre-built aarch64/sbsa DEB packages available via amdgpu-install
      # for Ubuntu 24.04.  Skip the ROCm plugin on this platform — the runtime
      # will simply not find libinferrs_backend_rocm.so and will fall back to
      # other available backends.

      # ── MUSA backend plugin (aarch64: Moore Threads ships SDK for ARM) ──
      - name: Build MUSA backend plugin
        run: |
          cargo build --release --target aarch64-unknown-linux-gnu \
            -p inferrs-backend-musa

      # ── Vulkan backend plugin (arm64 systems can have Vulkan drivers) ────
      - name: Build Vulkan backend plugin
        run: |
          cargo build --release --target aarch64-unknown-linux-gnu \
            -p inferrs-backend-vulkan

      # ── OpenVINO backend plugin (no compile-time SDK needed) ─────────────
      - name: Build OpenVINO backend plugin
        run: |
          cargo build --release --target aarch64-unknown-linux-gnu \
            -p inferrs-backend-openvino

      # ── CANN backend plugin (no compile-time CANN SDK needed) ────────────
      # Huawei Ascend NPUs are commonly paired with aarch64 CPUs; the plugin
      # probes libascendcl.so via dlopen at runtime.
      - name: Build CANN backend plugin
        run: |
          cargo build --release --target aarch64-unknown-linux-gnu \
            -p inferrs-backend-cann

      # ── Hexagon backend plugin (Snapdragon SoCs on aarch64 Linux) ────────
      # Probes libcdsprpc.so via dlopen at runtime; no compile-time SDK needed.
      - name: Build Hexagon backend plugin
        run: |
          cargo build --release --target aarch64-unknown-linux-gnu \
            -p inferrs-backend-hexagon

      # ── Package ──────────────────────────────────────────────────────────
      - name: Package
        run: |
          RELEASE_DIR="target/aarch64-unknown-linux-gnu/release"
          STAGE="inferrs-linux-aarch64"
          mkdir -p "$STAGE"
          cp "$RELEASE_DIR/inferrs" "$STAGE/"
          for lib in \
            libinferrs_backend_cann.so \
            libinferrs_backend_cuda.so \
            libinferrs_backend_hexagon.so \
            libinferrs_backend_musa.so \
            libinferrs_backend_openvino.so \
            libinferrs_backend_rocm.so \
            libinferrs_backend_vulkan.so; do
            [ -f "$RELEASE_DIR/$lib" ] && cp "$RELEASE_DIR/$lib" "$STAGE/"
          done
          tar -czf inferrs-aarch64-unknown-linux-gnu.tar.gz "$STAGE"

      - uses: actions/upload-artifact@v4
        with:
          name: inferrs-aarch64-unknown-linux-gnu
          path: inferrs-aarch64-unknown-linux-gnu.tar.gz

  # ── Windows x86_64 binary (with CUDA + ROCm support) ────────────────────
  build-windows-x86:
    name: Build (x86_64-pc-windows-msvc)
    runs-on: windows-2022
    env:
      CUDA_COMPUTE_CAP: "80"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-x86_64-windows

      # ── CUDA toolkit + MSVC environment ─────────────────────────────────
      # Jimver/cuda-toolkit installs nvcc and adds it to PATH.
      # ilammy/msvc-dev-cmd adds cl.exe to PATH (required by nvcc on Windows).
      # The main binary and CUDA backend must be built in the same cargo
      # invocation so Cargo's feature unification propagates the `cuda`
      # feature to candle-core inside the main binary.
      #
      # candle-core uses cudarc with fallback-dynamic-loading so the
      # resulting binary calls LoadLibrary for nvcuda.dll / cublas64_*.dll
      # on demand and has no hard import-table entries for those DLLs.
      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.22
        with:
          cuda: '12.6.0'
          method: network
          sub-packages: '["nvcc", "cudart", "nvrtc", "nvrtc_dev", "cublas", "cublas_dev", "curand", "curand_dev"]'

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build main binary + CUDA backend plugin
        run: |
          cargo build --release --target x86_64-pc-windows-msvc `
            -p inferrs -p inferrs-backend-cuda

      # ── ROCm backend plugin (Windows x86_64, ROCm HIP SDK) ──────────────
      # AMD does not publish the HIP SDK on Chocolatey; install via the
      # official AMD installer downloaded directly from AMD's CDN.
      # The installer accepts `-install` for a silent, non-interactive run.
      # Use the WinSvr2022 variant which is sized for server/CI workloads and
      # matches the windows-2022 runner.
      #
      # The resulting DLL uses the same `inferrs_backend_probe` ABI as the
      # Linux .so, so the Windows runtime LoadLibrary probe finds it using
      # the same logic as on Linux.
      - name: Install AMD HIP SDK (Windows)
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $installer = "$env:RUNNER_TEMP\AMD-HIP-SDK.exe"
          Invoke-WebRequest `
            -Uri "https://download.amd.com/developer/eula/rocm-hub/AMD-Software-PRO-Edition-24.Q4-WinSvr2022-For-HIP.exe" `
            -OutFile $installer
          $process = Start-Process $installer -ArgumentList '-install' -NoNewWindow -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            Write-Error "AMD HIP SDK installer failed with exit code $($process.ExitCode)"
            exit $process.ExitCode
          }

      - name: Build ROCm backend plugin
        shell: pwsh
        run: |
          # Resolve the versioned ROCm install path dynamically so the build
          # does not break when AMD releases a newer HIP SDK version.
          $rocmRoot = "C:\Program Files\AMD\ROCm"
          $rocmPath = Get-ChildItem $rocmRoot -Directory |
                        Sort-Object Name -Descending |
                        Select-Object -First 1 -ExpandProperty FullName
          if (-not $rocmPath) {
            Write-Error "No ROCm installation found under $rocmRoot"
            exit 1
          }
          Write-Host "Using ROCm at: $rocmPath"
          $env:ROCM_PATH = $rocmPath
          $env:HIP_PATH   = $rocmPath
          $env:PATH = "$rocmPath\bin;$env:PATH"
          cargo build --release --target x86_64-pc-windows-msvc `
            -p inferrs-backend-rocm

      # ── MUSA backend plugin (no compile-time MUSA SDK dependency) ────────
      # The MUSA plugin has no compile-time MUSA SDK dependency so it can be
      # built with the standard MSVC toolchain that is already available here.
      - name: Build MUSA backend plugin
        run: |
          cargo build --release --target x86_64-pc-windows-msvc `
            -p inferrs-backend-musa

      # Note: inferrs-backend-vulkan is intentionally NOT built for Windows.
      # The Vulkan probe body is cfg(not(target_os = "linux")) → always returns
      # 1 (unavailable), so shipping the DLL would waste space with no benefit.
      # When candle gains wgpu support and the Vulkan probe is extended to
      # Windows, add a build step and DLL entry here.

      # ── OpenVINO backend plugin (no compile-time SDK needed) ─────────────
      - name: Build OpenVINO backend plugin
        run: |
          cargo build --release --target x86_64-pc-windows-msvc `
            -p inferrs-backend-openvino

      # ── Hexagon backend plugin (fast-fails on x86_64 Windows) ────────────
      # The probe returns unavailable immediately on non-Snapdragon targets;
      # including the DLL is harmless and keeps the packaging symmetric.
      - name: Build Hexagon backend plugin
        run: |
          cargo build --release --target x86_64-pc-windows-msvc `
            -p inferrs-backend-hexagon

      - name: Package
        shell: pwsh
        run: |
          $releaseDir = "target\x86_64-pc-windows-msvc\release"
          $stage = "inferrs-windows-x86_64"
          New-Item -ItemType Directory -Force $stage | Out-Null
          Copy-Item "$releaseDir\inferrs.exe" "$stage\"
          # Ship all GPU backend plugins alongside the binary so the runtime
          # LoadLibrary search (next to the executable) finds them automatically.
          foreach ($dll in @(
            "inferrs_backend_cuda.dll",
            "inferrs_backend_hexagon.dll",
            "inferrs_backend_musa.dll",
            "inferrs_backend_openvino.dll",
            "inferrs_backend_rocm.dll"
          )) {
            if (Test-Path "$releaseDir\$dll") {
              Copy-Item "$releaseDir\$dll" "$stage\"
            }
          }
          Compress-Archive -Path "$stage\*" -DestinationPath "inferrs-x86_64-pc-windows-msvc.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: inferrs-x86_64-pc-windows-msvc
          path: inferrs-x86_64-pc-windows-msvc.zip

  # ── Windows aarch64 binary ────────────────────────────────────────────────
  build-windows-arm64:
    name: Build (aarch64-pc-windows-msvc)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-aarch64-windows

      - name: Build main binary
        run: cargo build --release --target aarch64-pc-windows-msvc -p inferrs

      # ── Hexagon backend plugin (Snapdragon X Elite on Windows ARM64) ──────
      # Snapdragon X Elite systems run Windows on ARM64 and have a Hexagon DSP;
      # the plugin probes libcdsprpc.dll via LoadLibrary at runtime.
      - name: Build Hexagon backend plugin
        run: |
          cargo build --release --target aarch64-pc-windows-msvc `
            -p inferrs-backend-hexagon

      # ── OpenVINO backend plugin (no compile-time SDK needed) ─────────────
      - name: Build OpenVINO backend plugin
        run: |
          cargo build --release --target aarch64-pc-windows-msvc `
            -p inferrs-backend-openvino

      - name: Package
        shell: pwsh
        run: |
          $releaseDir = "target\aarch64-pc-windows-msvc\release"
          $stage = "inferrs-windows-aarch64"
          New-Item -ItemType Directory -Force $stage | Out-Null
          Copy-Item "$releaseDir\inferrs.exe" "$stage\"
          foreach ($dll in @(
            "inferrs_backend_hexagon.dll",
            "inferrs_backend_openvino.dll"
          )) {
            if (Test-Path "$releaseDir\$dll") {
              Copy-Item "$releaseDir\$dll" "$stage\"
            }
          }
          Compress-Archive -Path "$stage\*" -DestinationPath "inferrs-aarch64-pc-windows-msvc.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: inferrs-aarch64-pc-windows-msvc
          path: inferrs-aarch64-pc-windows-msvc.zip

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Publish release
    needs: [build-macos, build-linux-x86, build-linux-arm64, build-windows-x86, build-windows-arm64]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Compute version
        id: version
        run: echo "version=0.0.$(date -u +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Create or update latest release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          SHA="${{ github.sha }}"
          SHORT="${SHA::7}"
          TAG="latest"

          gh release delete "$TAG" --yes 2>/dev/null || true
          gh api repos/$GH_REPO/git/refs/tags/$TAG \
            --method DELETE 2>/dev/null || true

          # Create both the mutable `latest` tag and an immutable versioned tag.
          # The versioned tag is what Scoop/Homebrew manifests reference so
          # their SHA256s stay valid after subsequent releases.
          gh release create "$TAG" \
            --target "$SHA" \
            --title "latest (${SHORT})" \
            --notes "Built from commit ${SHA}" \
            --prerelease \
            inferrs-*.tar.gz inferrs-*.zip

          gh release create "$VERSION" \
            --target "$SHA" \
            --title "${VERSION} (${SHORT})" \
            --notes "Built from commit ${SHA}" \
            --prerelease \
            inferrs-*.tar.gz inferrs-*.zip

  # ── Homebrew formula ───────────────────────────────────────────────────────
  update-formula:
    name: Update Homebrew formula
    needs: release
    runs-on: ubuntu-24.04
    env:
      VERSION: ${{ needs.release.outputs.version }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Compute SHA256s and push formula
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          SHA_MACOS=$(sha256sum inferrs-aarch64-apple-darwin.tar.gz | awk '{print $1}')
          SHA_LINUX_X86=$(sha256sum inferrs-x86_64-unknown-linux-gnu.tar.gz | awk '{print $1}')
          SHA_LINUX_ARM=$(sha256sum inferrs-aarch64-unknown-linux-gnu.tar.gz | awk '{print $1}')

          BASE="https://github.com/${REPO}/releases/download/${VERSION}"

          cat > inferrs.rb <<EOF
          class Inferrs < Formula
            desc "A conservative-memory inference engine for LLMs"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE}/inferrs-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_MACOS}"
              end
            end

            on_linux do
              if Hardware::CPU.intel?
                url "${BASE}/inferrs-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_X86}"
              elsif Hardware::CPU.arm?
                url "${BASE}/inferrs-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_ARM}"
              end
            end

             def install
               bin.install "inferrs"

               # Install GPU/NPU backend plugins alongside the binary so the
               # inferrs binary can find them via dlopen at runtime.
               %w[
                 libinferrs_backend_cann.so
                 libinferrs_backend_cuda.so
                 libinferrs_backend_hexagon.so
                 libinferrs_backend_musa.so
                 libinferrs_backend_openvino.so
                 libinferrs_backend_openvino.dylib
                 libinferrs_backend_rocm.so
                 libinferrs_backend_vulkan.so
               ].each do |plugin|
                 bin.install plugin if File.exist?(plugin)
               end
             end

            test do
              assert_match "inferrs", shell_output("#{bin}/inferrs --help")
            end
          end
          EOF

          # Push to homebrew tap repo via API
          CONTENT=$(base64 -w0 inferrs.rb)

          FILE_SHA=$(curl -sf \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/ericcurtin/homebrew-inferrs/contents/Formula/inferrs.rb" \
            | jq -r '.sha // empty')

          PAYLOAD=$(jq -n \
            --arg message "Update formula to ${{ github.sha }}" \
            --arg content "$CONTENT" \
            --arg sha "$FILE_SHA" \
            'if $sha != "" then {message: $message, content: $content, sha: $sha}
             else {message: $message, content: $content} end')

          curl -sf -X PUT \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://api.github.com/repos/ericcurtin/homebrew-inferrs/contents/Formula/inferrs.rb"

  # ── Scoop bucket manifest ──────────────────────────────────────────────────
  update-scoop:
    name: Update Scoop bucket
    needs: release
    runs-on: ubuntu-24.04
    env:
      VERSION: ${{ needs.release.outputs.version }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Compute SHA256s and push Scoop manifest
        env:
          GH_TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          SHA_WIN_X86=$(sha256sum inferrs-x86_64-pc-windows-msvc.zip | awk '{print $1}')
          SHA_WIN_ARM=$(sha256sum inferrs-aarch64-pc-windows-msvc.zip | awk '{print $1}')

          BASE="https://github.com/${REPO}/releases/download/${VERSION}"

          # ── Scoop manifest (JSON) ─────────────────────────────────────────
          cat > inferrs.json <<EOF
          {
            "version": "${VERSION}",
            "description": "A conservative-memory inference engine for LLMs",
            "homepage": "https://github.com/${REPO}",
            "license": "Apache-2.0",
            "architecture": {
              "64bit": {
                "url": "${BASE}/inferrs-x86_64-pc-windows-msvc.zip",
                "hash": "${SHA_WIN_X86}"
              },
              "arm64": {
                "url": "${BASE}/inferrs-aarch64-pc-windows-msvc.zip",
                "hash": "${SHA_WIN_ARM}"
              }
            },
            "bin": "inferrs.exe",
            "checkver": {
              "github": "https://github.com/${REPO}"
            }
          }
          EOF

          # ── push manifest to the scoop bucket repo ────────────────────────
          CONTENT=$(base64 -w0 inferrs.json)

          FILE_SHA=$(curl -sf \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/ericcurtin/scoop-inferrs/contents/bucket/inferrs.json" \
            | jq -r '.sha // empty' || true)

          PAYLOAD=$(jq -n \
            --arg message "Update inferrs to ${VERSION}" \
            --arg content "$CONTENT" \
            --arg sha "$FILE_SHA" \
            'if $sha != "" then {message: $message, content: $content, sha: $sha}
             else {message: $message, content: $content} end')

          curl -sf -X PUT \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://api.github.com/repos/ericcurtin/scoop-inferrs/contents/bucket/inferrs.json"
