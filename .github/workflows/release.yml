name: Release

on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── macOS binary (Metal, linked directly) ─────────────────────────────────
  build-macos:
    name: Build (aarch64-apple-darwin)
    runs-on: macos-26
    env:
      RUSTFLAGS: "-C target-feature=+fullfp16"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-aarch64-apple-darwin

      - name: Build
        run: cargo build --release --target aarch64-apple-darwin -p inferrs

      - name: Package
        run: |
          tar -czf inferrs-aarch64-apple-darwin.tar.gz \
            -C target/aarch64-apple-darwin/release inferrs

      - uses: actions/upload-artifact@v4
        with:
          name: inferrs-aarch64-apple-darwin
          path: inferrs-aarch64-apple-darwin.tar.gz

  # ── Linux x86_64: main binary (with CUDA support) + all backend plugins ─────
  build-linux-x86:
    name: Build (x86_64-unknown-linux-gnu)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-x86_64-linux

      # ── CUDA backend plugin + main binary ───────────────────────────────
      # Install the CUDA toolkit headers/stubs (no GPU required to compile).
      # The main binary and CUDA backend must be built in the same cargo
      # invocation so that Cargo's feature unification propagates the `cuda`
      # feature to candle-core inside the main binary — without it,
      # Device::new_cuda() panics at runtime even when the plugin probe succeeds.
      - name: Install CUDA toolkit
        run: |
          wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cuda-toolkit-12-6
          echo "/usr/local/cuda/bin" >> "$GITHUB_PATH"
          echo "CUDA_PATH=/usr/local/cuda" >> "$GITHUB_ENV"
          # No GPU on CI runners; set a broadly-compatible compute capability
          # so bindgen_cuda skips the nvidia-smi probe and nvcc validation.
          echo "CUDA_COMPUTE_CAP=80" >> "$GITHUB_ENV"

      - name: Build main binary + CUDA backend plugin
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu \
            -p inferrs -p inferrs-backend-cuda

      # ── ROCm backend plugin ──────────────────────────────────────────────
      - name: Install ROCm toolkit
        run: |
          wget -q https://repo.radeon.com/amdgpu-install/6.3.3/ubuntu/noble/amdgpu-install_6.3.60303-1_all.deb
          sudo dpkg -i amdgpu-install_6.3.60303-1_all.deb || true
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            rocm-dev hip-dev

      - name: Build ROCm backend plugin
        env:
          ROCM_PATH: /opt/rocm
          HIP_PATH: /opt/rocm
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu \
            -p inferrs-backend-rocm

      # ── Vulkan backend plugin (no GPU toolchain needed) ──────────────────
      - name: Build Vulkan backend plugin
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu \
            -p inferrs-backend-vulkan

      # ── Package everything into one tarball ──────────────────────────────
      - name: Package
        run: |
          RELEASE_DIR="target/x86_64-unknown-linux-gnu/release"
          STAGE="inferrs-linux-x86_64"
          mkdir -p "$STAGE"

          # Main binary
          cp "$RELEASE_DIR/inferrs" "$STAGE/"

          # Backend plugins (ship all three; the binary picks the right one at
          # runtime via dlopen — missing plugins are silently skipped)
          for lib in \
            libinferrs_backend_cuda.so \
            libinferrs_backend_rocm.so \
            libinferrs_backend_vulkan.so; do
            if [ -f "$RELEASE_DIR/$lib" ]; then
              cp "$RELEASE_DIR/$lib" "$STAGE/"
            fi
          done

          tar -czf inferrs-x86_64-unknown-linux-gnu.tar.gz "$STAGE"

      - uses: actions/upload-artifact@v4
        with:
          name: inferrs-x86_64-unknown-linux-gnu
          path: inferrs-x86_64-unknown-linux-gnu.tar.gz

  # ── Linux aarch64: CPU-only binary + Vulkan plugin (no CUDA/ROCm on arm64) ─
  build-linux-arm64:
    name: Build (aarch64-unknown-linux-gnu)
    runs-on: ubuntu-24.04-arm
    env:
      RUSTFLAGS: "-C target-feature=+fullfp16"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-aarch64-linux

      # ── Main binary (CPU-only) ───────────────────────────────────────────
      - name: Build main binary
        run: cargo build --release --target aarch64-unknown-linux-gnu -p inferrs

      # ── Vulkan backend plugin (arm64 systems can have Vulkan drivers) ────
      - name: Build Vulkan backend plugin
        run: |
          cargo build --release --target aarch64-unknown-linux-gnu \
            -p inferrs-backend-vulkan

      # ── Package ──────────────────────────────────────────────────────────
      - name: Package
        run: |
          RELEASE_DIR="target/aarch64-unknown-linux-gnu/release"
          STAGE="inferrs-linux-aarch64"
          mkdir -p "$STAGE"
          cp "$RELEASE_DIR/inferrs" "$STAGE/"
          [ -f "$RELEASE_DIR/libinferrs_backend_vulkan.so" ] && \
            cp "$RELEASE_DIR/libinferrs_backend_vulkan.so" "$STAGE/"
          tar -czf inferrs-aarch64-unknown-linux-gnu.tar.gz "$STAGE"

      - uses: actions/upload-artifact@v4
        with:
          name: inferrs-aarch64-unknown-linux-gnu
          path: inferrs-aarch64-unknown-linux-gnu.tar.gz

  # ── Windows x86_64 binary ─────────────────────────────────────────────────
  build-windows-x86:
    name: Build (x86_64-pc-windows-msvc)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-x86_64-windows

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc -p inferrs

      - name: Package
        shell: pwsh
        run: |
          $stage = "inferrs-windows-x86_64"
          New-Item -ItemType Directory -Force $stage | Out-Null
          Copy-Item "target\x86_64-pc-windows-msvc\release\inferrs.exe" "$stage\"
          Compress-Archive -Path "$stage\*" -DestinationPath "inferrs-x86_64-pc-windows-msvc.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: inferrs-x86_64-pc-windows-msvc
          path: inferrs-x86_64-pc-windows-msvc.zip

  # ── Windows aarch64 binary ────────────────────────────────────────────────
  build-windows-arm64:
    name: Build (aarch64-pc-windows-msvc)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-aarch64-windows

      - name: Build
        run: cargo build --release --target aarch64-pc-windows-msvc -p inferrs

      - name: Package
        shell: pwsh
        run: |
          $stage = "inferrs-windows-aarch64"
          New-Item -ItemType Directory -Force $stage | Out-Null
          Copy-Item "target\aarch64-pc-windows-msvc\release\inferrs.exe" "$stage\"
          Compress-Archive -Path "$stage\*" -DestinationPath "inferrs-aarch64-pc-windows-msvc.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: inferrs-aarch64-pc-windows-msvc
          path: inferrs-aarch64-pc-windows-msvc.zip

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Publish release
    needs: [build-macos, build-linux-x86, build-linux-arm64, build-windows-x86, build-windows-arm64]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Compute version
        id: version
        run: echo "version=0.0.$(date -u +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Create or update latest release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          SHA="${{ github.sha }}"
          SHORT="${SHA::7}"
          TAG="latest"

          gh release delete "$TAG" --yes 2>/dev/null || true
          gh api repos/$GH_REPO/git/refs/tags/$TAG \
            --method DELETE 2>/dev/null || true

          # Create both the mutable `latest` tag and an immutable versioned tag.
          # The versioned tag is what winget manifests reference so their
          # SHA256s stay valid after subsequent releases.
          gh release create "$TAG" \
            --target "$SHA" \
            --title "latest (${SHORT})" \
            --notes "Built from commit ${SHA}" \
            --prerelease \
            inferrs-*.tar.gz inferrs-*.zip

          gh release create "$VERSION" \
            --target "$SHA" \
            --title "${VERSION} (${SHORT})" \
            --notes "Built from commit ${SHA}" \
            --prerelease \
            inferrs-*.tar.gz inferrs-*.zip

  # ── Homebrew formula ───────────────────────────────────────────────────────
  update-formula:
    name: Update Homebrew formula
    needs: release
    runs-on: ubuntu-24.04
    env:
      VERSION: ${{ needs.release.outputs.version }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Compute SHA256s and push formula
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          SHA_MACOS=$(sha256sum inferrs-aarch64-apple-darwin.tar.gz | awk '{print $1}')
          SHA_LINUX_X86=$(sha256sum inferrs-x86_64-unknown-linux-gnu.tar.gz | awk '{print $1}')
          SHA_LINUX_ARM=$(sha256sum inferrs-aarch64-unknown-linux-gnu.tar.gz | awk '{print $1}')

          BASE="https://github.com/${REPO}/releases/download/${VERSION}"

          cat > inferrs.rb <<EOF
          class Inferrs < Formula
            desc "A conservative-memory inference engine for LLMs"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE}/inferrs-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_MACOS}"
              end
            end

            on_linux do
              if Hardware::CPU.intel?
                url "${BASE}/inferrs-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_X86}"
              elsif Hardware::CPU.arm?
                url "${BASE}/inferrs-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_ARM}"
              end
            end

            def install
              bin.install "inferrs"

              # Install GPU backend plugins alongside the binary so the
              # inferrs binary can find them via dlopen at runtime.
              %w[
                libinferrs_backend_cuda.so
                libinferrs_backend_rocm.so
                libinferrs_backend_vulkan.so
              ].each do |plugin|
                bin.install plugin if File.exist?(plugin)
              end
            end

            test do
              assert_match "inferrs", shell_output("#{bin}/inferrs --help")
            end
          end
          EOF

          # Push to homebrew tap repo via API
          CONTENT=$(base64 -w0 inferrs.rb)

          FILE_SHA=$(curl -sf \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/ericcurtin/homebrew-inferrs/contents/Formula/inferrs.rb" \
            | jq -r '.sha // empty')

          PAYLOAD=$(jq -n \
            --arg message "Update formula to ${{ github.sha }}" \
            --arg content "$CONTENT" \
            --arg sha "$FILE_SHA" \
            'if $sha != "" then {message: $message, content: $content, sha: $sha}
             else {message: $message, content: $content} end')

          curl -sf -X PUT \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://api.github.com/repos/ericcurtin/homebrew-inferrs/contents/Formula/inferrs.rb"

  # ── winget manifest ────────────────────────────────────────────────────────
  update-winget:
    name: Update winget manifest
    needs: release
    runs-on: ubuntu-24.04
    env:
      VERSION: ${{ needs.release.outputs.version }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Compute SHA256s and submit winget PR
        env:
          GH_TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          SHA_WIN_X86=$(sha256sum inferrs-x86_64-pc-windows-msvc.zip | awk '{print $1}')
          SHA_WIN_ARM=$(sha256sum inferrs-aarch64-pc-windows-msvc.zip | awk '{print $1}')

          PUBLISHER="ericcurtin"
          PACKAGE_ID="${PUBLISHER}.inferrs"
          # Use the versioned tag so URLs are immutable and SHA256s stay valid
          BASE="https://github.com/${REPO}/releases/download/${VERSION}"

          mkdir -p manifests

          # ── version manifest ──────────────────────────────────────────────
          cat > manifests/${PACKAGE_ID}.yaml <<EOF
          PackageIdentifier: ${PACKAGE_ID}
          PackageVersion: ${VERSION}
          DefaultLocale: en-US
          ManifestType: version
          ManifestVersion: 1.6.0
          EOF

          # ── locale manifest ───────────────────────────────────────────────
          cat > manifests/${PACKAGE_ID}.locale.en-US.yaml <<EOF
          PackageIdentifier: ${PACKAGE_ID}
          PackageVersion: ${VERSION}
          PackageLocale: en-US
          Publisher: ${PUBLISHER}
          PackageName: inferrs
          License: Apache-2.0
          ShortDescription: A conservative-memory inference engine for LLMs
          PackageUrl: https://github.com/${REPO}
          ManifestType: defaultLocale
          ManifestVersion: 1.6.0
          EOF

          # ── installer manifest ────────────────────────────────────────────
          # InstallerType: zip requires NestedInstallerType + NestedInstallerFiles
          # so winget knows the executable path inside the archive.
          cat > manifests/${PACKAGE_ID}.installer.yaml <<EOF
          PackageIdentifier: ${PACKAGE_ID}
          PackageVersion: ${VERSION}
          InstallerType: zip
          NestedInstallerType: portable
          NestedInstallerFiles:
            - RelativeFilePath: inferrs.exe
              PortableCommandAlias: inferrs
          Installers:
            - Architecture: x64
              InstallerUrl: ${BASE}/inferrs-x86_64-pc-windows-msvc.zip
              InstallerSha256: ${SHA_WIN_X86}
            - Architecture: arm64
              InstallerUrl: ${BASE}/inferrs-aarch64-pc-windows-msvc.zip
              InstallerSha256: ${SHA_WIN_ARM}
          ManifestType: installer
          ManifestVersion: 1.6.0
          EOF

          DEST_DIR="manifests/e/ericcurtin/inferrs/${VERSION}"
          BRANCH="inferrs-${VERSION}"

          # ── create branch on fork before pushing files ────────────────────
          FORK_SHA=$(curl -sf \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${PUBLISHER}/winget-pkgs/git/ref/heads/master" \
            | jq -r '.object.sha')

          # 201 = created, 422 = branch already exists — both are acceptable
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg ref "refs/heads/${BRANCH}" --arg sha "$FORK_SHA" \
                 '{ref: $ref, sha: $sha}')" \
            "https://api.github.com/repos/${PUBLISHER}/winget-pkgs/git/refs")
          [[ "$HTTP_STATUS" == "201" || "$HTTP_STATUS" == "422" ]] || \
            { echo "Branch creation failed with HTTP ${HTTP_STATUS}"; exit 1; }

          # ── push manifest files to the fork branch ────────────────────────
          for FILE in \
            "${PACKAGE_ID}.yaml" \
            "${PACKAGE_ID}.locale.en-US.yaml" \
            "${PACKAGE_ID}.installer.yaml"; do

            CONTENT=$(base64 -w0 "manifests/${FILE}")

            # Fetch existing file SHA in case the file already exists on the branch
            FILE_SHA=$(curl -sf \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              "https://api.github.com/repos/${PUBLISHER}/winget-pkgs/contents/${DEST_DIR}/${FILE}?ref=${BRANCH}" \
              | jq -r '.sha // empty' || true)

            PAYLOAD=$(jq -n \
              --arg message "Add inferrs ${VERSION}" \
              --arg content "$CONTENT" \
              --arg branch "$BRANCH" \
              --arg sha "$FILE_SHA" \
              'if $sha != "" then {message: $message, content: $content, branch: $branch, sha: $sha}
               else {message: $message, content: $content, branch: $branch} end')

            curl -sf -X PUT \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "https://api.github.com/repos/${PUBLISHER}/winget-pkgs/contents/${DEST_DIR}/${FILE}"
          done

          # ── open PR from fork branch → microsoft/winget-pkgs ─────────────
          # 201 = created, 422 = PR already exists — both are acceptable
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg title "New package: ${PACKAGE_ID} version ${VERSION}" \
              --arg body "Automated submission from https://github.com/${REPO}" \
              --arg head "${PUBLISHER}:${BRANCH}" \
              --arg base "master" \
              '{title: $title, body: $body, head: $head, base: $base}')" \
            "https://api.github.com/repos/microsoft/winget-pkgs/pulls")
          [[ "$HTTP_STATUS" == "201" || "$HTTP_STATUS" == "422" ]] || \
            { echo "PR creation failed with HTTP ${HTTP_STATUS}"; exit 1; }
