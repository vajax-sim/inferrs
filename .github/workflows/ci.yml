name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      # Format-check only the packages that don't require GPU toolchains.
      - run: cargo fmt --check -p inferrs -p inferrs-backend-vulkan

  clippy:
    name: Clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Lint only packages that don't require GPU toolchains.
      - run: cargo clippy -p inferrs -p inferrs-backend-vulkan -- -D warnings

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-15
            rustflags: "-C target-feature=+fullfp16"
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            rustflags: ""
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            rustflags: "-C target-feature=+fullfp16"
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            rustflags: ""
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            rustflags: "-C target-feature=+fullfp16"
    env:
      RUSTFLAGS: ${{ matrix.rustflags }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      # Test only packages that don't require GPU toolchains.
      # The CUDA and ROCm backend plugins are built in the release workflow
      # where the appropriate toolchains are installed.
      - run: cargo test -p inferrs -p inferrs-backend-vulkan
