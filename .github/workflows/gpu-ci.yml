name: GPU CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  gpu-test:
    name: CUDA tests (nvidia-runner-1)
    runs-on: [self-hosted, Linux, X64, cuda]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev

      - name: Set up CUDA environment
        run: |
          # Find the CUDA installation (common paths on self-hosted runners)
          for d in /usr/local/cuda /opt/cuda /usr; do
            if [ -x "$d/bin/nvcc" ]; then
              echo "Found CUDA at $d"
              echo "$d/bin" >> "$GITHUB_PATH"
              echo "CUDA_PATH=$d" >> "$GITHUB_ENV"
              echo "LIBRARY_PATH=$d/lib64:${LIBRARY_PATH:-}" >> "$GITHUB_ENV"
              echo "LD_LIBRARY_PATH=$d/lib64:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
              NVCC="$d/bin/nvcc"
              break
            fi
          done
          "${NVCC:-nvcc}" --version

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: gpu-ci

      - name: Show GPU info
        run: nvidia-smi

      # candle-kernels unconditionally compiles WMMA (Tensor Core) CUDA
      # kernels which require SM 7.0+.  The runner's Pascal GPU is SM 6.1,
      # so auto-detection would produce a build that fails to compile.
      # Force SM 8.0 (Ampere) for compilation — the resulting PTX is
      # forward-compatible, and inferrs avoids unsupported code paths at
      # runtime via feature detection.
      - name: Build (with CUDA backend)
        run: cargo build -p inferrs -p inferrs-backend-cuda
        env:
          CUDA_COMPUTE_CAP: "80"

      - name: Run unit tests
        run: cargo test -p inferrs -p inferrs-backend-cuda
        env:
          CUDA_COMPUTE_CAP: "80"

      - name: Run integration tests (ignored, require GPU + model)
        run: cargo test -p inferrs --test server_integration -- --ignored --nocapture --test-threads=1
        continue-on-error: true
        env:
          CUDA_COMPUTE_CAP: "80"
          # HuggingFace Hub caches models in ~/.cache/huggingface by default.
          # On a self-hosted runner this persists between runs, so model
          # downloads only happen once.
          HF_HOME: /home/runner/.cache/huggingface
