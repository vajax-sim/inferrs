name: GPU CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  gpu-test:
    name: CUDA tests (nvidia-runner-1)
    runs-on: [self-hosted, Linux, X64, cuda]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          dpkg -s pkg-config libssl-dev &>/dev/null || \
            { sudo apt-get update -q && sudo apt-get install -y --no-install-recommends pkg-config libssl-dev; }

      - name: Set up CUDA + detect GPU
        run: bash .github/scripts/cuda-setup.sh

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: gpu-ci

      - name: Build (with CUDA backend)
        run: cargo build -p inferrs -p inferrs-backend-cuda

      - name: Run unit tests
        run: cargo test -p inferrs -p inferrs-backend-cuda

      # HuggingFace Hub caches models under ~/.cache/huggingface by default.
      # On the self-hosted runner this cache persists between runs so the
      # model is only downloaded once.
      - name: Run integration tests (ignored, require GPU + model)
        run: cargo test -p inferrs --test server_integration -- --ignored --nocapture --test-threads=1
        continue-on-error: true
